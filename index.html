<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/pwa-192x192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1e5631" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SISPROD BM" />
    <meta name="description" content="Sistema de Produtividade Operacional — Brigada Militar RS" />
    <title>SISPROD BM - Produtividade Operacional</title>
    <script>
      (function () {
        var w = window.innerWidth || screen.width;
        var h = window.innerHeight || screen.height;
        var ua = navigator.userAgent;

        var isTablet = /iPad|Android(?!.*Mobile)|Tablet|PlayBook|Silk/i.test(ua) ||
          (w >= 768 && w <= 1366 && 'ontouchstart' in window);
        var isMobile = !isTablet && ('ontouchstart' in window || /Mobi|Android|iPhone|iPod/i.test(ua));
        var isPC = !isMobile && !isTablet;

        var scale = 1.0;

        if (isMobile) {
          scale = 1.0;
        } else if (isTablet) {
          if (w >= 1024) scale = 1.0;
          else if (w >= 768) scale = 0.95;
          else scale = 0.9;
        } else {
          scale = 1.0;
        }

        var viewport = document.querySelector('meta[name="viewport"]');
        if (viewport) {
          viewport.setAttribute('content',
            'width=device-width, initial-scale=' + scale +
            ', maximum-scale=' + scale +
            ', minimum-scale=' + scale +
            ', user-scalable=no'
          );
        }

        var html = document.documentElement;
        html.classList.remove('device-mobile', 'device-tablet', 'device-pc');
        if (isMobile) html.classList.add('device-mobile');
        else if (isTablet) html.classList.add('device-tablet');
        else html.classList.add('device-pc');

        window.__deviceType = isMobile ? 'mobile' : isTablet ? 'tablet' : 'pc';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
